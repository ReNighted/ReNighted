name: Update profile widgets

on:
  schedule:
    - cron: "*/15 * * * *" # every 15 minutes
  push:
    paths:
      - "discord_status.py"
      - "local_time.py"
      - ".github/workflows/discord-status.yml"
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  update-widgets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate discord-status.svg
        run: python discord_status.py

      - name: Generate local-time.svg
        run: python local_time.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add discord-status.svg local-time.svg

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update profile widgets"

          # The schedule can overlap with a manual push to the repo, which
          # makes a plain 'git push' get rejected as non-fast-forward.
          # Rebase onto the latest remote state and retry a few times.
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main && git push origin main; then
              exit 0
            fi
            echo "Push attempt $i failed, retrying..."
            sleep $((RANDOM % 10 + 5))
          done

          echo "Failed to push after several retries"
          exit 1

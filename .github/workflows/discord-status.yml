name: Update profile widgets

on:
  schedule:
    - cron: "*/15 * * * *" # every 15 minutes
  push:
    paths:
      - "discord_status.py"
      - "local_time.py"
      - ".github/workflows/discord-status.yml"
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  update-widgets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate and push widgets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # These files are regenerated from scratch on every run, so there's
          # nothing to merge if two runs overlap. Instead of rebasing (which
          # will conflict almost every time, since the same lines change),
          # always regenerate on top of the latest remote state and retry.
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main

            python discord_status.py
            python local_time.py

            git add discord-status.svg local-time.svg

            if git diff --staged --quiet; then
              echo "No changes to commit"
              exit 0
            fi

            git commit -m "Update profile widgets"

            if git push origin main; then
              exit 0
            fi

            echo "Push attempt $i failed, retrying..."
            sleep $((RANDOM % 10 + 5))
          done

          echo "Failed to push after several retries"
          exit 1

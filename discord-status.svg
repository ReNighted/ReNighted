<svg width="380" height="96" viewBox="0 0 380 96" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Discord presence for renighted">
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#142242"/>
    </linearGradient>
    <clipPath id="avatarClip">
      <circle cx="48" cy="48" r="26"/>
    </clipPath>
  </defs>

  <rect x="1" y="1" width="378" height="94" rx="16" fill="url(#cardBg)" stroke="#2a3a5c" stroke-width="1"/>

  <image href="https://cdn.discordapp.com/avatars/1060803221167280159/7ee2a64607f8491a83e8e1b230861f80.png?size=64" x="22" y="22" width="52" height="52" clip-path="url(#avatarClip)"/>
  <circle cx="48" cy="48" r="26" fill="none" stroke="#2a3a5c" stroke-width="2"/>

  <circle cx="68" cy="68" r="9" fill="#142242"/>
  <circle cx="68" cy="68" r="6" fill="#6b7a9e">
    <animate attributeName="opacity" values="1;0.6;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <text x="96" y="42" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="600" fill="#eaf1ff">renighted</text>
  <text x="96" y="64" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#b8c4d9">asleep under the mountains</text>
</svg>

      <circle cx="1030.2" cy="164.3" r="1.82" fill="#cfe0ff"><animate attributeName="opacity" values="0.36;0.96;0.36" dur="3.33s" begin="4.65s" repeatCount="indefinite"/></circle>
      <circle cx="956.6" cy="147.1" r="1.82" fill="#eaf1ff"><animate attributeName="opacity" values="0.66;0.87;0.66" dur="4.84s" begin="4.29s" repeatCount="indefinite"/></circle>
      <circle cx="272.5" cy="139.8" r="1.29" fill="#eaf1ff"><animate attributeName="opacity" values="0.67;0.88;0.67" dur="2.47s" begin="0.97s" repeatCount="indefinite"/></circle>

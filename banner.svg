      <circle cx="509.3" cy="46.6" r="1.41" fill="#cfe0ff"><animate attributeName="opacity" values="0.43;0.9;0.43" dur="5.19s" begin="3.25s" repeatCount="indefinite"/></circle>
      <circle cx="527.0" cy="93.7" r="0.78" fill="#eaf1ff"><animate attributeName="opacity" values="0.49;0.94;0.49" dur="3.04s" begin="1.1s" repeatCount="indefinite"/></circle>

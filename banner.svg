      <circle cx="793.8" cy="64.9" r="1.07" fill="#cfe0ff"><animate attributeName="opacity" values="0.64;0.9;0.64" dur="3.27s" begin="2.04s" repeatCount="indefinite"/></circle>
      <circle cx="484.8" cy="59.5" r="0.79" fill="#eaf1ff"><animate attributeName="opacity" values="0.73;0.95;0.73" dur="4.93s" begin="3.08s" repeatCount="indefinite"/></circle>

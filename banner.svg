  <!-- shooting star, streaks by rarely and briefly -->
  <g>
    <line x1="120" y1="40" x2="180" y2="66" stroke="#eaf1ff" stroke-width="2" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" values="0;0;0;1;1;0;0" keyTimes="0;0.55;0.57;0.6;0.66;0.7;1" dur="9s" begin="1.2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,0;0,0;260,90;0,0" keyTimes="0;0.55;0.57;0.68;1" dur="9s" begin="1.2s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- drifting clouds (soft overlapping puffs) -->
  <g opacity="0.13" filter="url(#softBlur)">
    <g>
      <ellipse cx="200" cy="58" rx="55" ry="12" fill="#c9d6f2"/>
      <ellipse cx="250" cy="52" rx="40" ry="10" fill="#c9d6f2"/>
      <ellipse cx="150" cy="54" rx="38" ry="9" fill="#c9d6f2"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;36,0;0,0" dur="28s" repeatCount="indefinite"/>
    </g>
    <g>
      <ellipse cx="850" cy="118" rx="70" ry="13" fill="#c9d6f2"/>
      <ellipse cx="910" cy="112" rx="50" ry="11" fill="#c9d6f2"/>
      <ellipse cx="790" cy="122" rx="45" ry="10" fill="#c9d6f2"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;-44,0;0,0" dur="34s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- moon -->
  <circle cx="980" cy="72" r="70" fill="url(#moonGlow)"/>
  <circle cx="980" cy="72" r="30" fill="url(#moonBody)">
    <animate attributeName="r" values="30;31.5;30" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="970" cy="62" r="4" fill="#e4dcc4" opacity="0.5"/>
  <circle cx="990" cy="80" r="2.4" fill="#e4dcc4" opacity="0.4"/>
  <circle cx="985" cy="60" r="1.6" fill="#e4dcc4" opacity="0.35"/>

  <!-- far mountains -->
  <polygon fill="url(#mtnFar)" opacity="0.55"
    points="0,230 90,175 180,215 260,160 360,220 460,170 560,225 660,180 760,230 860,190 960,235 1060,195 1150,232 1200,210 1200,300 0,300"/>

  <!-- mid mountains -->
  <polygon fill="url(#mtnMid)" opacity="0.85"
    points="0,255 120,195 230,245 340,185 430,250 540,200 650,255 760,205 880,258 990,210 1100,252 1200,225 1200,300 0,300"/>

  <!-- near mountains (foreground silhouette) -->
  <polygon fill="url(#mtnNear)"
    points="0,300 0,270 70,225 150,260 250,205 330,255 410,215 500,262 610,222 700,265 800,218 900,268 1000,230 1080,270 1150,240 1200,265 1200,300"/>

  <!-- a few pine silhouettes along the near ridge for texture -->
  <g fill="#080a16">
    <polygon points="150,260 158,238 166,260"/>
    <polygon points="163,260 172,232 181,260"/>
    <polygon points="330,255 338,233 346,255"/>
    <polygon points="700,265 708,241 716,265"/>
    <polygon points="712,265 721,237 730,265"/>
    <polygon points="1000,230 1008,206 1016,230"/>
  </g>

  <!-- soft mist over the base -->
  <rect x="0" y="230" width="1200" height="70" fill="url(#mist)"/>
</svg>

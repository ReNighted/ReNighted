<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A peaceful night sky over a mountain range">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060a17"/>
      <stop offset="45%" stop-color="#0e1a3a"/>
      <stop offset="75%" stop-color="#1c2f5c"/>
      <stop offset="100%" stop-color="#33447a"/>
    </linearGradient>

    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fdfaf0" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#f4ecd8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f4ecd8" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="moonBody" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fffef8"/>
      <stop offset="70%" stop-color="#f2ecd9"/>
      <stop offset="100%" stop-color="#ddd6bd"/>
    </radialGradient>

    <linearGradient id="mtnFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#39508c"/>
      <stop offset="100%" stop-color="#2b3d6e"/>
    </linearGradient>

    <linearGradient id="mtnMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#232f56"/>
      <stop offset="100%" stop-color="#182140"/>
    </linearGradient>

    <linearGradient id="mtnNear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#11162c"/>
      <stop offset="100%" stop-color="#080a16"/>
    </linearGradient>

    <linearGradient id="mist" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9d6f2" stop-opacity="0"/>
      <stop offset="100%" stop-color="#c9d6f2" stop-opacity="0.16"/>
    </linearGradient>

    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <!-- sky -->
  <rect x="0" y="0" width="1200" height="300" fill="url(#sky)"/>

  <!-- stars -->
  <g>

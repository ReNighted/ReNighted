      <circle cx="457.2" cy="165.7" r="1.0" fill="#cfe0ff"><animate attributeName="opacity" values="0.53;0.91;0.53" dur="5.08s" begin="4.98s" repeatCount="indefinite"/></circle>
      <circle cx="665.8" cy="124.6" r="0.83" fill="#eaf1ff"><animate attributeName="opacity" values="0.74;0.94;0.74" dur="3.92s" begin="3.74s" repeatCount="indefinite"/></circle>
      <circle cx="77.5" cy="104.0" r="1.35" fill="#cfe0ff"><animate attributeName="opacity" values="0.41;0.99;0.41" dur="2.62s" begin="0.93s" repeatCount="indefinite"/></circle>
      <circle cx="712.1" cy="118.0" r="0.95" fill="#eaf1ff"><animate attributeName="opacity" values="0.71;0.89;0.71" dur="4.06s" begin="3.1s" repeatCount="indefinite"/></circle>

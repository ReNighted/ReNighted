      <circle cx="507.9" cy="18.6" r="0.93" fill="#eaf1ff"><animate attributeName="opacity" values="0.36;0.88;0.36" dur="4.22s" begin="2.72s" repeatCount="indefinite"/></circle>
      <circle cx="270.1" cy="104.7" r="1.81" fill="#eaf1ff"><animate attributeName="opacity" values="0.67;0.95;0.67" dur="3.35s" begin="0.78s" repeatCount="indefinite"/></circle>
